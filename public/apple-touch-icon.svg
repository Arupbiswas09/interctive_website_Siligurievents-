<?xml version="1.0" encoding="UTF-8"?>
<!--
  Siligurievent — Apple Touch Icon (180×180)
  ────────────────────────────────────────────
  • Larger frame (no rounded corners — iOS will mask). Full bleed cream
    background with deeper brass border and a slightly larger jasmine bloom.
  • Designed to read on both light and dark iOS home screens.

  Export-to-PNG instructions:
    sharp("apple-touch-icon.svg").resize(180).png().toFile("apple-touch-icon.png")
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 180 180"
  width="180"
  height="180"
  role="img"
  aria-labelledby="title"
>
  <title id="title">Siligurievent</title>

  <!-- Cream-jasmine bleed background — iOS masks corners automatically. -->
  <rect width="180" height="180" fill="#F4ECDF"/>

  <!-- Subtle brass hairline frame (clipped slightly to allow iOS mask). -->
  <rect x="8" y="8" width="164" height="164" fill="none" stroke="#A47A2C" stroke-width="1.2" rx="22"/>

  <!-- Centered SE monogram, scaled from 100-unit viewBox into the
       middle 100x100 of the 180x180 canvas (centered on 90,90, scale 1). -->
  <g transform="translate(40 40)">
    <!-- S -->
    <path
      d="M 50 22 C 42 18 28 18 22 26 C 16 34 18 44 28 48 C 36 50 44 50 50 50 C 56 50 52 56 46 60 C 36 64 24 64 20 72 C 16 80 22 86 32 86 C 40 86 46 84 50 80 L 48 78 C 44 82 38 84 32 84 C 24 84 18 80 20 74 C 24 68 36 66 46 62 C 54 58 56 50 50 48 C 44 46 36 46 28 46 C 22 44 18 36 24 30 C 30 22 42 22 50 24 Z"
      fill="#0F0C09"
    />
    <!-- E -->
    <path
      d="M 50 22 L 78 22 L 78 28 L 56 28 C 56 36 56 42 56 48 L 72 48 L 72 54 L 56 54 C 56 64 56 72 56 82 L 80 82 L 80 88 L 50 88 L 50 22 Z"
      fill="#0F0C09"
    />
    <!-- Jasmine bloom -->
    <g fill="#A47A2C">
      <path d="M 50 50 C 48 44 47 38 50 36 C 53 38 52 44 50 50 Z"/>
      <path d="M 50 50 C 55 47 60 47 61 50 C 60 53 55 53 50 50 Z"/>
      <path d="M 50 50 C 54 55 56 60 53 62 C 50 60 50 55 50 50 Z"/>
      <path d="M 50 50 C 47 55 45 60 42 58 C 41 55 45 52 50 50 Z"/>
      <path d="M 50 50 C 45 47 40 47 39 50 C 40 53 45 53 50 50 Z"/>
      <circle cx="50" cy="50" r="1.6" fill="#0F0C09"/>
    </g>
  </g>
</svg>
